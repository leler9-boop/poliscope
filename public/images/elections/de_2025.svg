<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-de" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </linearGradient>
    <linearGradient id="glow-de" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#bg-de)"/>
  <ellipse cx="400" cy="160" rx="380" ry="160" fill="url(#glow-de)"/>
  <text x="40" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="180" font-weight="bold" fill="white" opacity="0.04" letter-spacing="-4">2025</text>
  <!-- Reichstag building base -->
  <rect x="280" y="230" width="240" height="60" fill="white" opacity="0.06"/>
  <!-- Columns -->
  <rect x="292" y="215" width="8" height="75" fill="white" opacity="0.09"/>
  <rect x="310" y="215" width="8" height="75" fill="white" opacity="0.09"/>
  <rect x="328" y="215" width="8" height="75" fill="white" opacity="0.09"/>
  <rect x="346" y="215" width="8" height="75" fill="white" opacity="0.09"/>
  <rect x="364" y="215" width="8" height="75" fill="white" opacity="0.09"/>
  <rect x="430" y="215" width="8" height="75" fill="white" opacity="0.09"/>
  <rect x="448" y="215" width="8" height="75" fill="white" opacity="0.09"/>
  <rect x="466" y="215" width="8" height="75" fill="white" opacity="0.09"/>
  <rect x="484" y="215" width="8" height="75" fill="white" opacity="0.09"/>
  <rect x="502" y="215" width="8" height="75" fill="white" opacity="0.09"/>
  <!-- Entablature -->
  <rect x="278" y="210" width="244" height="7" fill="white" opacity="0.10"/>
  <!-- Glass dome above centre -->
  <path d="M370 210 Q400 150 430 210 Z" fill="white" opacity="0.06"/>
  <path d="M375 208 Q400 158 425 208" fill="none" stroke="white" stroke-width="1" opacity="0.18"/>
  <!-- Dome ribs suggestion -->
  <line x1="400" y1="152" x2="400" y2="210" stroke="white" stroke-width="0.8" opacity="0.12"/>
  <line x1="388" y1="156" x2="376" y2="208" stroke="white" stroke-width="0.8" opacity="0.10"/>
  <line x1="412" y1="156" x2="424" y2="208" stroke="white" stroke-width="0.8" opacity="0.10"/>
  <!-- Steps -->
  <rect x="268" y="290" width="264" height="5" fill="white" opacity="0.06"/>
  <rect x="258" y="295" width="284" height="5" fill="white" opacity="0.05"/>
  <!-- Country tag -->
  <rect x="50" y="56" width="80" height="1.5" fill="#888888" opacity="0.9"/>
  <text x="50" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#aaaaaa" letter-spacing="3">GERMANY</text>
  <!-- Main title -->
  <text x="50" y="98" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="white" opacity="0.95">Bundestagswahl</text>
  <text x="50" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="white" opacity="0.95">2025</text>
  <!-- Subtitle -->
  <text x="50" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" opacity="0.45">Merz · Scholz · Weidel · Habeck · Lindner · Wagenknecht</text>
  <!-- German tricolor accent bar -->
  <rect x="0" y="308" width="267" height="12" fill="#1a1a1a" opacity="0.95"/>
  <rect x="267" y="308" width="266" height="12" fill="#CC0000" opacity="0.75"/>
  <rect x="533" y="308" width="267" height="12" fill="#FFCD00" opacity="0.75"/>
</svg>
