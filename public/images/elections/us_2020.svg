<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-us" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a2f4a"/>
    </linearGradient>
    <linearGradient id="glow-us" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg-us)"/>

  <!-- Subtle radial glow -->
  <ellipse cx="400" cy="180" rx="360" ry="160" fill="url(#glow-us)"/>

  <!-- Large watermark year -->
  <text x="50" y="265" font-family="Georgia, 'Times New Roman', serif" font-size="220" font-weight="bold" fill="white" opacity="0.04" letter-spacing="-6">2020</text>

  <!-- Capitol dome silhouette -->
  <!-- Main building base -->
  <rect x="260" y="248" width="270" height="36" fill="white" opacity="0.07"/>
  <!-- Side wings -->
  <rect x="220" y="258" width="50" height="26" fill="white" opacity="0.05"/>
  <rect x="520" y="258" width="50" height="26" fill="white" opacity="0.05"/>
  <!-- Central drum -->
  <rect x="345" y="218" width="100" height="32" fill="white" opacity="0.07"/>
  <!-- Dome -->
  <path d="M345 218 Q395 145 445 218 Z" fill="white" opacity="0.08"/>
  <!-- Dome highlight -->
  <path d="M353 216 Q395 152 437 216" fill="none" stroke="white" stroke-width="1" opacity="0.22"/>
  <!-- Lantern at top -->
  <rect x="388" y="139" width="14" height="18" fill="white" opacity="0.10"/>
  <path d="M388 139 L395 128 L402 139 Z" fill="white" opacity="0.10"/>
  <!-- Columns on central block -->
  <rect x="352" y="218" width="5" height="32" fill="white" opacity="0.10"/>
  <rect x="364" y="218" width="5" height="32" fill="white" opacity="0.10"/>
  <rect x="376" y="218" width="5" height="32" fill="white" opacity="0.10"/>
  <rect x="408" y="218" width="5" height="32" fill="white" opacity="0.10"/>
  <rect x="420" y="218" width="5" height="32" fill="white" opacity="0.10"/>
  <rect x="432" y="218" width="5" height="32" fill="white" opacity="0.10"/>
  <!-- Steps -->
  <rect x="245" y="284" width="300" height="5" fill="white" opacity="0.06"/>
  <rect x="235" y="289" width="320" height="4" fill="white" opacity="0.05"/>

  <!-- Subtle star field top-right -->
  <circle cx="680" cy="55" r="1.2" fill="white" opacity="0.35"/>
  <circle cx="700" cy="42" r="0.9" fill="white" opacity="0.25"/>
  <circle cx="720" cy="60" r="1.4" fill="white" opacity="0.30"/>
  <circle cx="695" cy="70" r="0.8" fill="white" opacity="0.20"/>
  <circle cx="660" cy="70" r="1.1" fill="white" opacity="0.28"/>
  <circle cx="710" cy="25" r="1.0" fill="white" opacity="0.22"/>
  <circle cx="740" cy="45" r="0.9" fill="white" opacity="0.20"/>
  <circle cx="750" cy="68" r="1.2" fill="white" opacity="0.25"/>

  <!-- Content area -->
  <!-- Country tag -->
  <rect x="50" y="56" width="80" height="1.5" fill="#4a80d4" opacity="0.9"/>
  <text x="50" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#7fa8e0" letter-spacing="3">UNITED STATES</text>

  <!-- Main title -->
  <text x="50" y="98" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="white" opacity="0.95">Presidential Election</text>
  <text x="50" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="white" opacity="0.95">2020</text>

  <!-- Subtitle -->
  <text x="50" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" opacity="0.45">Biden vs. Trump · 306 – 232 electoral votes</text>

  <!-- Red and blue accent bars -->
  <rect x="0" y="308" width="400" height="12" fill="#002395" opacity="0.7"/>
  <rect x="400" y="308" width="400" height="12" fill="#BF0A30" opacity="0.7"/>
</svg>
