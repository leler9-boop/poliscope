<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <!--
    Poliscop horizontal logo
    Icon (60x80) + Text "Poliscop"
  -->

  <!-- === ICON (scaled to fit 60x80 viewport at left) === -->
  <g transform="translate(4, 2) scale(0.6)">
    <!-- Stem (descender) -->
    <rect x="10" y="14" width="23" height="82" rx="5" fill="#5270A0"/>
    <!-- Ribbon tab -->
    <polygon points="10,96 33,96 21.5,112" fill="#5270A0"/>
    <!-- Bowl -->
    <circle cx="54" cy="46" r="40" fill="#5270A0"/>
    <!-- White counter -->
    <circle cx="56" cy="44" r="26" fill="white"/>
    <!-- Inner mark -->
    <circle cx="56" cy="44" r="13" fill="#5270A0"/>
  </g>

  <!-- === TEXT "Poliscop" === -->
  <text
    x="72"
    y="52"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="36"
    font-weight="700"
    fill="#1A2845"
    letter-spacing="-0.5"
  >Poliscop</text>
</svg>
