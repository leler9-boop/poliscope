<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-fr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e2d45"/>
    </linearGradient>
    <linearGradient id="glow-fr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b5998" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg-fr)"/>

  <!-- Subtle radial glow -->
  <ellipse cx="400" cy="160" rx="380" ry="160" fill="url(#glow-fr)"/>

  <!-- Large watermark year -->
  <text x="50" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="220" font-weight="bold" fill="white" opacity="0.04" letter-spacing="-6">2022</text>

  <!-- Dome silhouette (Assemblée Nationale / Panthéon style) -->
  <!-- Columns -->
  <rect x="270" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="290" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="310" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="330" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="350" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="370" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="390" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="410" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="430" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="450" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="470" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="490" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <rect x="510" y="230" width="8" height="55" fill="white" opacity="0.08"/>
  <!-- Base entablature -->
  <rect x="260" y="225" width="270" height="8" fill="white" opacity="0.10"/>
  <!-- Dome -->
  <path d="M330 225 Q395 140 460 225 Z" fill="white" opacity="0.07"/>
  <!-- Dome highlight arc -->
  <path d="M340 222 Q395 148 452 222" fill="none" stroke="white" stroke-width="1" opacity="0.18"/>
  <!-- Steps -->
  <rect x="250" y="283" width="290" height="6" fill="white" opacity="0.06"/>
  <rect x="240" y="289" width="310" height="5" fill="white" opacity="0.05"/>

  <!-- Content area -->
  <!-- Country tag -->
  <rect x="50" y="56" width="70" height="1.5" fill="#4a80d4" opacity="0.9"/>
  <text x="50" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#7fa8e0" letter-spacing="3">FRANCE</text>

  <!-- Main title -->
  <text x="50" y="98" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="white" opacity="0.95">Élection présidentielle</text>
  <text x="50" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="white" opacity="0.95">2022</text>

  <!-- Subtitle -->
  <text x="50" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" opacity="0.45">Macron · Le Pen · Mélenchon · Zemmour et 8 candidats</text>

  <!-- French tricolor accent bar -->
  <rect x="0" y="308" width="267" height="12" fill="#002395" opacity="0.75"/>
  <rect x="267" y="308" width="266" height="12" fill="#f0f0f0" opacity="0.75"/>
  <rect x="533" y="308" width="267" height="12" fill="#ED2939" opacity="0.75"/>
</svg>
