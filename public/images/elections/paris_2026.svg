<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-paris" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1f35"/>
      <stop offset="100%" stop-color="#1c2d4a"/>
    </linearGradient>
    <linearGradient id="glow-paris" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a5080" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f1f35" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#bg-paris)"/>
  <ellipse cx="400" cy="160" rx="380" ry="160" fill="url(#glow-paris)"/>
  <text x="40" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="180" font-weight="bold" fill="white" opacity="0.04" letter-spacing="-4">2026</text>
  <!-- Eiffel Tower silhouette -->
  <!-- Main triangle body -->
  <path d="M400 100 L340 290 L460 290 Z" fill="white" opacity="0.05"/>
  <!-- Tower legs -->
  <path d="M400 100 L348 290" fill="none" stroke="white" stroke-width="2.5" opacity="0.10"/>
  <path d="M400 100 L452 290" fill="none" stroke="white" stroke-width="2.5" opacity="0.10"/>
  <!-- Cross braces -->
  <path d="M358 200 L442 200" fill="none" stroke="white" stroke-width="1.5" opacity="0.10"/>
  <path d="M352 240 L448 240" fill="none" stroke="white" stroke-width="1.5" opacity="0.10"/>
  <path d="M345 270 L455 270" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
  <!-- First floor platform -->
  <rect x="362" y="196" width="76" height="6" fill="white" opacity="0.10"/>
  <!-- Second floor platform -->
  <rect x="353" y="236" width="94" height="6" fill="white" opacity="0.10"/>
  <!-- Top antenna -->
  <line x1="400" y1="100" x2="400" y2="80" stroke="white" stroke-width="2" opacity="0.12"/>
  <!-- Lattice suggestion left -->
  <path d="M358 200 L352 240" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
  <path d="M362 200 L356 240" fill="none" stroke="white" stroke-width="1" opacity="0.06"/>
  <path d="M370 200 L364 240" fill="none" stroke="white" stroke-width="1" opacity="0.06"/>
  <!-- Lattice suggestion right -->
  <path d="M438 200 L444 240" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
  <path d="M430 200 L436 240" fill="none" stroke="white" stroke-width="1" opacity="0.06"/>
  <!-- Base -->
  <rect x="338" y="288" width="124" height="5" fill="white" opacity="0.08"/>
  <rect x="330" y="293" width="140" height="5" fill="white" opacity="0.06"/>
  <!-- Country tag -->
  <rect x="50" y="56" width="110" height="1.5" fill="#4a80d4" opacity="0.9"/>
  <text x="50" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#7fa8e0" letter-spacing="3">PARIS · FRANCE</text>
  <!-- Main title -->
  <text x="50" y="98" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="white" opacity="0.95">Municipales Paris</text>
  <text x="50" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="white" opacity="0.95">2026</text>
  <!-- Subtitle -->
  <text x="50" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" opacity="0.45">Hidalgo · Dati · Belliard · Beaune</text>
  <!-- French tricolor accent bar -->
  <rect x="0" y="308" width="267" height="12" fill="#002395" opacity="0.75"/>
  <rect x="267" y="308" width="266" height="12" fill="#f0f0f0" opacity="0.75"/>
  <rect x="533" y="308" width="267" height="12" fill="#ED2939" opacity="0.75"/>
</svg>
