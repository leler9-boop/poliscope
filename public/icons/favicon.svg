<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    Poliscop favicon — "p" lettermark simplifié pour petite taille
    Rendu net à 16, 32, 48px
  -->
  <!-- Fond rond blanc (optionnel, commenté — le fond est transparent par défaut) -->
  <!-- <circle cx="16" cy="16" r="16" fill="white"/> -->

  <!-- Stem -->
  <rect x="3" y="4" width="7" height="24" rx="2" fill="#5270A0"/>
  <!-- Ribbon -->
  <polygon points="3,28 10,28 6.5,32" fill="#5270A0"/>
  <!-- Bowl -->
  <circle cx="17" cy="13" r="12" fill="#5270A0"/>
  <!-- White counter -->
  <circle cx="18" cy="12" r="7.5" fill="white"/>
  <!-- Inner mark -->
  <circle cx="18" cy="12" r="3.8" fill="#5270A0"/>
</svg>
